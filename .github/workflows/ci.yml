name: Anomaly Detection CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:


jobs:

  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"


      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Verify model artifacts
        run: |
          test -f models/scaler.pkl
          test -f models/isolation_forest.pkl
          test -f models/autoencoder.keras
          test -f models/metadata.json


      - name: Run pytest
        run: |
          python -m pytest -v


  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    needs:
      - test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Build Docker image
        run: |
          docker build \
            -t anomaly-detection-app:${{ github.sha }} \
            .